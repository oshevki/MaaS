services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maas
      POSTGRES_USER: maas
      POSTGRES_PASSWORD: maas
    ports:
      - "5432:5432"
    volumes:
      - maas-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maas -d maas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  maas-postgres-data:
